function getCityCoords(address){
  if(!address)return null;
  const u=address.toUpperCase();
  for(const[city,coords]of Object.entries(CITY_COORDS)){
    if(u.includes(city))return{coords,city:city.charAt(0)+city.slice(1).toLowerCase()};
  }
  return null;
}

function scorePermit(p){
  if(p.score&&p.score>0)return p.score;
  let s=0;
  const desc=(p.description||"").toLowerCase();
  const type=(p.permit_type||"").toLowerCase();
  const val=parseFloat(p.project_value)||0;
  const county=(p.county||"").toLowerCase();
  const owner=(p.owner_name||"").toLowerCase();
  const gc=(p.gc_name||"").toLowerCase();
  // Hurricane / FEMA / disaster recovery
  if(p.is_hurricane||HURRICANE_KW.some(k=>desc.includes(k)))s+=4;
  // New construction
  if(type.includes("new")||type.includes("construction"))s+=3;
  // Multifamily bonus
  if(type.includes("multifamily")||type.includes("multi")||desc.includes("multifamily"))s+=2;
  // Owner-builder (no GC = opportunity)
  if((!gc||gc==="—"||gc.length<2)&&(desc.includes("owner")||desc.includes("owner-builder")||desc.includes("owner builder")))s+=2;
  // Value
  if(val>500000)s+=2;else if(val>200000)s+=1;
  // Hot counties
  if(["pinellas","hillsborough","manatee","pasco"].includes(county))s+=1;
  // Early window
  if(p.status==="Applied"||p.status==="In Review")s+=1;
  return Math.min(s,10);
}

function isOwnerBuilder(p){
  const desc=(p.description||"").toLowerCase();
  const gc=(p.gc_name||"");
  return(!gc||gc.length<2)&&(desc.includes("owner")||desc.includes("owner-builder")||desc.includes("owner builder")||(p.permit_type||"").toLowerCase().includes("owner"));
}
function isHurricane(p){return p.is_hurricane||HURRICANE_KW.some(k=>(p.description||"").toLowerCase().includes(k));}
function fmt(n){if(!n)return"—";const v=parseFloat(n);if(isNaN(v))return"—";if(v>=1000000)return`$${(v/1000000).toFixed(1)}M`;if(v>=1000)return`$${(v/1000).toFixed(0)}K`;return`$${v.toLocaleString()}`;}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  const parseRow=line=>{
    const cols=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;continue;}
      if(line[i]===','&&!inQ){cols.push(cur.trim());cur="";continue;}
      cur+=line[i];
    }
    cols.push(cur.trim());return cols;
  };
  const headers=parseRow(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z0-9]/g,"_"));
  return lines.slice(1).map(l=>{
    const cols=parseRow(l);if(cols.length<2)return null;
    const row={};headers.forEach((h,i)=>{row[h]=cols[i]||"";});return row;
  }).filter(Boolean);
}

function detectCounty(filename,records){
  const fn=filename.toLowerCase();
  // Handle common typos: "Pinelas", "Pinnelas", "Pinellas"
  if(fn.includes("pinela")||fn.includes("pinella")||fn.includes("pinnela"))return"Pinellas";
  if(fn.includes("hillsborough")||fn.includes("hillsbor"))return"Hillsborough";
  if(fn.includes("orange")||fn.includes("orlando"))return"Orange";
  if(fn.includes("osceola"))return"Osceola";
  if(fn.includes("seminole"))return"Seminole";
  if(fn.includes("manatee"))return"Manatee";
  if(fn.includes("sarasota"))return"Sarasota";
  if(fn.includes("pasco"))return"Pasco";
  if(fn.includes("lee"))return"Lee";
  // Detect from addresses
  if(records.length>0){
    const addr=(records[0].address||records[0].permit_address||"").toUpperCase();
    const PINELLAS_CITIES=["CLEARWATER","PINELLAS PARK","ST. PETE","SAINT PETE","ST PETE","TARPON SPRINGS","DUNEDIN","LARGO","INDIAN ROCKS","REDINGTON","TREASURE ISLAND","MADEIRA BEACH","PALM HARBOR","SAFETY HARBOR","OLDSMAR","BELLEAIR","GULFPORT","SEMINOLE FL","TIERRA VERDE","KENNETH CITY"];
    const HILLS_CITIES=["TAMPA","BRANDON","RIVERVIEW","WESLEY CHAPEL","PLANT CITY","GIBSONTON","RUSKIN","SEFFNER","VALRICO","APOLLO BEACH","WIMAUMA","LUTZ","LAND O LAKES","THONOTOSASSA","NEW TAMPA"];
    if(PINELLAS_CITIES.some(c=>addr.includes(c)))return"Pinellas";
    if(HILLS_CITIES.some(c=>addr.includes(c)))return"Hillsborough";
    // Check ZIP codes
    const zipMatch=addr.match(/FL\s+(\d{5})/);
    if(zipMatch){
      const zip=parseInt(zipMatch[1]);
      if((zip>=33701&&zip<=33716)||(zip>=33755&&zip<=33786)||(zip>=33755&&zip<=33778))return"Pinellas";
      if((zip>=33602&&zip<=33619)||(zip>=33629&&zip<=33629)||(zip>=33634&&zip<=33647))return"Hillsborough";
    }
  }
  return"Unknown";
}

function mapCSVRecord(row,county,permitType){
  const address=row.address||row.permit_address||row.site_address||"";
  const recordNum=row.record_number||row.permit_number||row.record_num||"";
  let city="";
  const cm=address.match(/,?\s*([A-Za-z][A-Za-z\s]+?)\s+FL\s+\d{5}/i);
  if(cm)city=cm[1].trim();
  const desc=[row.description||row.worktype||"",row.project_name||""].filter(Boolean).join(" | ");
  const hurr=HURRICANE_KW.some(k=>desc.toLowerCase().includes(k));
  const permit={
    id:(recordNum||Math.random().toString(36).slice(2))+"_"+address.slice(0,30),
    permit_number:recordNum,address,city,county,
    permit_type:row.record_type||row.application_type||permitType||"",
    description:desc,
    status:row.status||row.application_status||row.statuscurrent||"",
    date_filed:row.date||row.date_filed||row.applieddate||row.processed_date||"",
    project_value:parseFloat(row.project_value||row.valuation||row.estimated_cost||"")||null,
    sqft:parseFloat(row.square_footage||row.sqft||"")||null,
    owner_name:row.property_owner_name||row.owner||"",
    gc_name:row.contractor_name||row.contractor||"",
    gc_phone:row.contractor_phone_number||row.phone||"",
    source:"CSV",is_hurricane:hurr,score:0,
  };
  permit.score=scorePermit(permit);
  return permit;
}

// ── LEADS TABLE ───────────────────────────────────────────────────────────────
function LeadsTable({permits,onSelect,initialFilter,onFilterUsed}){
  const[search,setSearch]=useState("");
  const[county,setCounty]=useState("All Counties");
  const[status,setStatus]=useState("All Statuses");
  const[permitType,setPermitType]=useState("All Types");
  const[valueRange,setValueRange]=useState("Any Value");
  const[yearFilter,setYearFilter]=useState("All Years");
  const[hurricaneOnly,setHurricaneOnly]=useState(false);
  const[ownerBuilderOnly,setOwnerBuilderOnly]=useState(false);
  const[multifamilyOnly,setMultifamilyOnly]=useState(false);
  const[hotOnly,setHotOnly]=useState(false);
  const[page,setPage]=useState(1);
  const[selected,setSelected]=useState(new Set());

  useEffect(()=>{
    if(!initialFilter)return;
    setHurricaneOnly(false);setOwnerBuilderOnly(false);setMultifamilyOnly(false);setHotOnly(false);
    if(initialFilter==="hurricane")setHurricaneOnly(true);
    else if(initialFilter==="owner-builder")setOwnerBuilderOnly(true);
    else if(initialFilter==="multifamily")setMultifamilyOnly(true);
    else if(initialFilter==="hot")setHotOnly(true);
    setPage(1);
    if(onFilterUsed)onFilterUsed();
  },[initialFilter]);
  const PER=50;
  const bS={background:T.bgCard,color:T.white,border:`1px solid ${T.border}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:13};

  const filtered=useMemo(()=>{
    let list=permits.map(p=>({...p,_s:scorePermit(p),_h:isHurricane(p),_ob:isOwnerBuilder(p),_mf:(p.permit_type||"").toLowerCase().includes("multi")||(p.description||"").toLowerCase().includes("multifamily")}));
    if(search){const q=search.toLowerCase();list=list.filter(p=>(p.address||"").toLowerCase().includes(q)||(p.gc_name||"").toLowerCase().includes(q)||(p.owner_name||"").toLowerCase().includes(q)||(p.description||"").toLowerCase().includes(q)||(p.permit_number||"").toLowerCase().includes(q));}
    if(county!=="All Counties")list=list.filter(p=>p.county===county);
    if(status!=="All Statuses")list=list.filter(p=>p.status===status);
    if(permitType!=="All Types"){
      const pt=permitType.toLowerCase();
      if(pt.includes("fema")||pt.includes("hurricane"))list=list.filter(p=>p._h);
      else if(pt.includes("owner"))list=list.filter(p=>p._ob);
      else if(pt.includes("multifamily")||pt.includes("multi"))list=list.filter(p=>p._mf);
      else if(pt.includes("single family"))list=list.filter(p=>(p.permit_type||"").toLowerCase().includes("single")||(p.permit_type||"").toLowerCase().includes("sfr")||(p.permit_type||"").toLowerCase().includes("residential new"));
      else if(pt.includes("commercial"))list=list.filter(p=>(p.permit_type||"").toLowerCase().includes("commercial"));
      else if(pt.includes("demolition"))list=list.filter(p=>(p.permit_type||"").toLowerCase().includes("demo"));
      else if(pt.includes("renovation")||pt.includes("alteration"))list=list.filter(p=>(p.permit_type||"").toLowerCase().includes("renov")||(p.permit_type||"").toLowerCase().includes("alter")||(p.permit_type||"").toLowerCase().includes("repair")||(p.permit_type||"").toLowerCase().includes("remodel"));
      else if(pt.includes("buildout")||pt.includes("tenant"))list=list.filter(p=>(p.description||"").toLowerCase().includes("buildout")||(p.description||"").toLowerCase().includes("tenant")||(p.description||"").toLowerCase().includes("build-out"));
      else list=list.filter(p=>(p.permit_type||"").toLowerCase().includes(pt));
    }
    if(hurricaneOnly)list=list.filter(p=>p._h);
    if(ownerBuilderOnly)list=list.filter(p=>p._ob);
    if(multifamilyOnly)list=list.filter(p=>p._mf);
    if(hotOnly)list=list.filter(p=>p._s>=8);
    // Filter by value range
    const vr=VALUE_RANGES.find(r=>r.label===valueRange);
    if(vr&&vr.min>0||vr&&vr.max!==Infinity){
      list=list.filter(p=>{const v=parseFloat(p.project_value)||0;return v>=vr.min&&v<vr.max;});
    }
    // Filter by year
    const yf=YEAR_FILTERS.find(y=>y.label===yearFilter);
    if(yf&&yf.year>0){
      list=list.filter(p=>{if(!p.date_filed)return false;const y=new Date(p.date_filed).getFullYear();return y>=yf.year;});
    }
    return list.sort((a,b)=>b._s-a._s);
  },[permits,search,county,status,permitType,valueRange,yearFilter,hurricaneOnly,ownerBuilderOnly,multifamilyOnly,hotOnly]);

  const totalPages=Math.max(1,Math.ceil(filtered.length/PER));
  const pageData=filtered.slice((page-1)*PER,page*PER);

  const exportCSV=()=>{
    const src=selected.size>0?filtered.filter(p=>selected.has(p.id)):filtered;
    const h=["Permit#","Address","County","Type","Value","Date","Status","Owner","GC","Score","Hurricane"];
    const rows=src.map(p=>[p.permit_number,p.address,p.county,p.permit_type,p.project_value,p.date_filed,p.status,p.owner_name,p.gc_name,p._s||scorePermit(p),isHurricane(p)?"Yes":"No"]);
    const csv=[h,...rows].map(r=>r.map(c=>`"${c||""}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="yeahradar_export.csv";a.click();
  };

  const toggleSelect=id=>{
    const s=new Set(selected);
    if(s.has(id))s.delete(id);else s.add(id);
    setSelected(s);
  };

  const selectAll=()=>{
    if(selected.size===pageData.length)setSelected(new Set());
    else setSelected(new Set(pageData.map(p=>p.id)));
  };

  return<div style={{padding:"28px 36px",overflowY:"auto",height:"100%",display:"flex",flexDirection:"column",background:T.bg}} className="animate-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div>
        <h1 style={{color:T.white,fontSize:24,fontWeight:900,margin:0,fontFamily:"'Space Grotesk',sans-serif",letterSpacing:-0.5}}>Opportunities</h1>
        <p style={{color:T.gray,fontSize:13,margin:"4px 0 0"}}>{filtered.length.toLocaleString()} permits{selected.size>0&&<span style={{color:T.lime}}> · {selected.size} selected</span>}</p>
      </div>
      <button onClick={exportCSV} style={{background:T.lime,color:"#fff",border:"none",borderRadius:10,padding:"10px 22px",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
        ↓ Export{selected.size>0?` (${selected.size})`:" CSV"}
      </button>
    </div>

    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
      <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="Search address, permit #, GC, owner, city..." style={{background:T.bgCard,color:T.white,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 14px",fontSize:13,outline:"none",width:260,flex:"0 0 260px"}}/>
      <Sel value={county} onChange={v=>{setCounty(v);setPage(1);}} options={COUNTIES}/>
      <Sel value={permitType} onChange={v=>{setPermitType(v);setPage(1);}} options={PERMIT_TYPES}/>
      <Sel value={status} onChange={v=>{setStatus(v);setPage(1);}} options={STATUSES}/>
      <Sel value={valueRange} onChange={v=>{setValueRange(v);setPage(1);}} options={VALUE_RANGES.map(r=>r.label)}/>
      <Sel value={yearFilter} onChange={v=>{setYearFilter(v);setPage(1);}} options={YEAR_FILTERS.map(y=>y.label)}/>
    </div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
      {[
        {label:"🌀 FEMA / Hurricane",active:hurricaneOnly,color:T.hurricane,toggle:()=>{const v=!hurricaneOnly;setHurricaneOnly(v);if(v){setHotOnly(false);setOwnerBuilderOnly(false);setMultifamilyOnly(false);}setPage(1);}},
        {label:"🔥 HOT score 8+",active:hotOnly,color:T.hot,toggle:()=>{const v=!hotOnly;setHotOnly(v);if(v){setHurricaneOnly(false);setOwnerBuilderOnly(false);setMultifamilyOnly(false);}setPage(1);}},
        {label:"🔨 Owner-Builder",active:ownerBuilderOnly,color:T.warm,toggle:()=>{const v=!ownerBuilderOnly;setOwnerBuilderOnly(v);if(v){setHurricaneOnly(false);setHotOnly(false);setMultifamilyOnly(false);}setPage(1);}},
        {label:"🏢 Multifamily",active:multifamilyOnly,color:T.blue,toggle:()=>{const v=!multifamilyOnly;setMultifamilyOnly(v);if(v){setHurricaneOnly(false);setHotOnly(false);setOwnerBuilderOnly(false);}setPage(1);}},
      ].map(f=>(
        <button key={f.label} onClick={f.toggle} style={{background:f.active?f.color+"22":"transparent",color:f.active?f.color:T.gray,border:`1px solid ${f.active?f.color:T.border}`,borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>
          {f.label}
        </button>
      ))}
      {(hurricaneOnly||ownerBuilderOnly||multifamilyOnly||hotOnly||permitType!=="All Types"||county!=="All Counties"||valueRange!=="Any Value"||yearFilter!=="All Years")&&
        <button onClick={()=>{setHurricaneOnly(false);setOwnerBuilderOnly(false);setMultifamilyOnly(false);setHotOnly(false);setPermitType("All Types");setCounty("All Counties");setStatus("All Statuses");setValueRange("Any Value");setYearFilter("All Years");setSearch("");setPage(1);}} style={{background:"transparent",color:T.gray,border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>
          Clear filters ×
        </button>
      }
    </div>

    <div style={{overflowX:"auto",flex:1,background:T.bgCard,borderRadius:14,border:`1px solid ${T.border}`}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:800}}>
        <thead style={{position:"sticky",top:0,background:T.bgCard,zIndex:10,borderBottom:`1px solid ${T.borderLight}`}}>
          <tr>
            <th style={{padding:"12px 14px",width:36}}>
              <input type="checkbox" checked={selected.size===pageData.length&&pageData.length>0} onChange={selectAll} style={{cursor:"pointer",accentColor:T.lime}}/>
            </th>
            {["Score","Address","County","Type","Value","Filed","Status","GC",""].map(h=><th key={h} style={{padding:"12px 10px",fontWeight:600,textAlign:"left",color:T.gray,fontSize:11,letterSpacing:.8,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>)}
          </tr>
        </thead>
        <tbody>
          {pageData.map((p,i)=>{
            const sel=selected.has(p.id);
            return<tr key={i} onClick={()=>onSelect(p)} style={{borderTop:`1px solid ${T.border}`,cursor:"pointer",background:sel?"rgba(13,110,253,0.05)":"transparent",transition:"background 0.1s"}} onMouseEnter={e=>!sel&&(e.currentTarget.style.background="rgba(13,110,253,0.03)")} onMouseLeave={e=>!sel&&(e.currentTarget.style.background="transparent")}>
              <td style={{padding:"10px 14px"}} onClick={e=>e.stopPropagation()}>
                <input type="checkbox" checked={sel} onChange={()=>toggleSelect(p.id)} style={{cursor:"pointer",accentColor:T.lime}}/>
              </td>
              <td style={{padding:"10px"}}><ScorePill score={p._s}/></td>
              <td style={{padding:"10px",maxWidth:240}}>
                <div style={{color:T.white,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.address}</div>
                <div style={{color:T.gray,fontSize:11,marginTop:2}}>{p.city}</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:3}}>
                  {p._h&&<Tag type="hurricane" small/>}
                  {p._ob&&<span style={{background:"rgba(255,165,2,0.12)",color:T.warm,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:4}}>🔨 Owner-Builder</span>}
                  {p._mf&&<span style={{background:"rgba(61,142,248,0.12)",color:T.blue,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:4}}>🏢 Multi</span>}
                </div>
              </td>
              <td style={{padding:"10px",color:T.gray,whiteSpace:"nowrap"}}>{p.county}</td>
              <td style={{padding:"10px",color:T.grayLight,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:12}}>{p.permit_type||"—"}</td>
              <td style={{padding:"10px",color:T.lime,fontWeight:700,whiteSpace:"nowrap"}}>{fmt(p.project_value)}</td>
              <td style={{padding:"10px",color:T.gray,whiteSpace:"nowrap",fontSize:12}}>{p.date_filed?p.date_filed.slice(0,10):"—"}</td>
              <td style={{padding:"10px"}}><span style={{color:p.status==="Applied"?T.blue:p.status==="Issued"?T.green:T.gray,fontWeight:600,fontSize:12}}>{p.status||"—"}</span></td>
              <td style={{padding:"10px",color:T.grayLight,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:12}}>{p.gc_name||"—"}</td>
              <td style={{padding:"10px"}}><button onClick={e=>{e.stopPropagation();onSelect(p);}} style={{background:T.lime,color:"#fff",border:"none",borderRadius:7,padding:"4px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>View</button></td>
            </tr>;
          })}
          {pageData.length===0&&<tr><td colSpan={10} style={{padding:80,textAlign:"center",color:T.gray}}>
            <div style={{fontSize:32,marginBottom:12}}>🔍</div>
            <div style={{fontWeight:600,marginBottom:4}}>No permits match your filters</div>
            <div style={{fontSize:12}}>Try adjusting your search or uploading more CSVs in Data Sync</div>
          </td></tr>}
        </tbody>
      </table>
    </div>

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14,color:T.gray,fontSize:13}}>
      <span>Showing {Math.min((page-1)*PER+1,filtered.length).toLocaleString()}–{Math.min(page*PER,filtered.length).toLocaleString()} of {filtered.length.toLocaleString()}</span>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <button onClick={()=>setPage(1)} disabled={page===1} style={{...bS,opacity:page===1?0.4:1}}>«</button>
        <button onClick={()=>setPage(p=>p-1)} disabled={page===1} style={{...bS,opacity:page===1?0.4:1}}>‹</button>
        <span style={{padding:"5px 14px",color:T.white,background:T.bgCard,borderRadius:6,border:`1px solid ${T.border}`,fontSize:13}}>Page {page} of {totalPages}</span>
        <button onClick={()=>setPage(p=>p+1)} disabled={page>=totalPages} style={{...bS,opacity:page>=totalPages?0.4:1}}>›</button>
        <button onClick={()=>setPage(totalPages)} disabled={page>=totalPages} style={{...bS,opacity:page>=totalPages?0.4:1}}>»</button>
      </div>
    </div>
  </div>;
}

// ── LEAD DETAIL ───────────────────────────────────────────────────────────────
function LeadDetail({permit,onBack,onAddToCRM,crmLeads}){
  const[stage,setStage]=useState("New");
  const[assignTo,setAssignTo]=useState("Emanuel");
  const[notes,setNotes]=useState("");
  const[showEmail,setShowEmail]=useState(false);
  const[copied,setCopied]=useState("");
  const[saving,setSaving]=useState(false);
  const[liveData,setLiveData]=useState(null);
  const[fetchingLive,setFetchingLive]=useState(false);
  const[fetchError,setFetchError]=useState("");
  const mapRef=useRef(null);
  const leafletMapRef=useRef(null);
  const score=scorePermit(permit);
  const hurr=isHurricane(permit);
  const existing=crmLeads.find(l=>l.permit_id===permit.id);
  const v=fmt(permit.project_value);

  const fetchLiveData=async()=>{
    setFetchingLive(true);setFetchError("");setLiveData(null);
    try{
      const gcName=(permit.gc_name||"").trim();
      const results={gc:null,pcpao:null,links:{}};

      // 1. Florida DBPR license lookup
      if(gcName.length>2){
        try{
          const term=encodeURIComponent(gcName);
          const r=await fetch(`https://www.myfloridalicense.com/cc_apiservice/services/LicenseSearch?LastName=${term}&FirstName=&LicenseType=CBC,CGC,CRC&County=&City=&Zip=&LicenseNumber=&format=json`,{headers:{Accept:"application/json"}});
          if(r.ok){
            const d=await r.json();
            if(Array.isArray(d)&&d.length>0){
              const match=d.find(x=>(x.LicenseName||"").toLowerCase().includes(gcName.toLowerCase().split(" ")[0]))||d[0];
              results.gc={
                name:match.LicenseName||gcName,
                license:match.LicenseNumber||"",
                type:match.LicenseType||"",
                status:match.LicenseStatus||"",
                phone:match.Phone||match.BusinessPhone||"",
                email:match.Email||"",
                address:[match.MailAddress,match.City,match.State,match.Zip].filter(Boolean).join(", "),
              };
            }
          }
        }catch(e){console.log("DBPR error",e);}
      }

      // 2. PCPAO for Pinellas owner info
      if((permit.county||"").toLowerCase()==="pinellas"&&permit.address){
        try{
          const addr=encodeURIComponent(permit.address.split(",")[0]);
          const r=await fetch(`https://www.pcpao.gov/api/v1/parcel/address?address=${addr}&format=json`);
          if(r.ok){
            const d=await r.json();
            if(d&&d.parcels&&d.parcels[0]){
              const p=d.parcels[0];
              results.pcpao={owner:p.owner_name||"",value:p.just_value||""};
            }
          }
        }catch(e){console.log("PCPAO error",e);}
      }

      // 3. Always build manual links
      results.links={
        dbpr:gcName?`https://www.myfloridalicense.com/wl11.asp?mode=0&cmd=LS&Lic_Name=${encodeURIComponent(gcName)}`:"",
        sunbiz:gcName?`https://search.sunbiz.org/Inquiry/CorporationSearch/SearchResults?inquiryType=EntityName&searchTerm=${encodeURIComponent(gcName)}`:"",
        google:`https://www.google.com/search?q=${encodeURIComponent((gcName||permit.owner_name||permit.address)+" Florida contractor phone email")}`,
        pcpao:permit.address?`https://www.pcpao.gov/general-info/parcel-search?address=${encodeURIComponent(permit.address)}`:"",
      };

      setLiveData(results);
    }catch(e){
      setFetchError("Error al buscar. Intentá de nuevo.");
    }finally{setFetchingLive(false);}
  };

  const email=`Subject: Opportunity at ${permit.address} — ${permit.county} County\n\nHi ${permit.gc_name||"[GC Name]"},\n\nI found the permit filed at ${permit.address} in ${permit.county} County (${permit.permit_type}${permit.project_value?` — ${v}`:""}).${hurr?"\n\nThis is a hurricane rebuild / FEMA 50% rule compliance project.":""}\n\nWe have immediate availability to support your project scope in this area.\n\nWorth a 15-minute call this week?\n\n[Your Name]\n[Your Company]\n[Your Phone]\n[Your Email]`;
  const wa=`Hi ${permit.gc_name||"[GC]"}, I found the permit at ${permit.address}${permit.project_value?` (${v})`:""}. We have availability for this project. Worth a quick call? — [Your Name]`;

  const copy=(text,label)=>{
    try{navigator.clipboard.writeText(text);}catch(e){const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}
    setCopied(label);setTimeout(()=>setCopied(""),2000);
  };

  const handleSaveCRM=async()=>{
    setSaving(true);
    await onAddToCRM({permit_id:permit.id,stage,assigned_to:assignTo,notes});
    setSaving(false);
  };

  // Init map for this specific address
  useEffect(()=>{
    if(!window.L||!mapRef.current)return;
    if(leafletMapRef.current){leafletMapRef.current.remove();leafletMapRef.current=null;}

    // Try to get coords from city lookup first
    const cityData=getCityCoords(permit.address);
    const defaultLat=cityData?cityData.coords[0]:27.9506;
    const defaultLng=cityData?cityData.coords[1]:-82.4572;

    const map=window.L.map(mapRef.current,{
      center:[defaultLat,defaultLng],
      zoom:15,
      zoomControl:true,
      scrollWheelZoom:false,
    });
    window.L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
      attribution:'© OpenStreetMap © CARTO',
      subdomains:"abcd",maxZoom:19,
    }).addTo(map);

    // Add marker at city coords
    const color=hurr?"#e76f51":score>=8?"#e63946":"#0d6efd";
    const icon=window.L.divIcon({
      className:"",
      html:`<div style="width:40px;height:40px;background:${color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px ${color}88;border:3px solid #fff">${hurr?"🌀":"📍"}</div>`,
      iconSize:[40,40],iconAnchor:[20,20],
    });
    const marker=window.L.marker([defaultLat,defaultLng],{icon}).addTo(map);
    marker.bindPopup(`<div style="font-family:Inter,sans-serif"><b>${permit.permit_number||"Permit"}</b><br><small>${permit.address}</small></div>`).openPopup();

    // Try geocoding via Nominatim for exact coords
    const encoded=encodeURIComponent(permit.address+", Florida, USA");
    fetch(`https://nominatim.openstreetmap.org/search?q=${encoded}&format=json&limit=1`)
      .then(r=>r.json())
      .then(data=>{
        if(data&&data[0]){
          const lat=parseFloat(data[0].lat);
          const lng=parseFloat(data[0].lon);
          marker.setLatLng([lat,lng]);
          map.setView([lat,lng],16);
          marker.openPopup();
        }
      })
      .catch(()=>{});

    leafletMapRef.current=map;
    return()=>{if(leafletMapRef.current){leafletMapRef.current.remove();leafletMapRef.current=null;}};
  },[permit.id]);

  const Field=({label,value})=><div style={{padding:"10px 0",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16}}>
    <span style={{color:T.gray,fontSize:11,textTransform:"uppercase",letterSpacing:.8,flexShrink:0}}>{label}</span>
    <span style={{color:T.white,fontWeight:600,fontSize:13,textAlign:"right"}}>{value||"—"}</span>
  </div>;

  return<div style={{padding:"28px 36px",overflowY:"auto",height:"100%",background:T.bg}} className="animate-in">
    <button onClick={onBack} style={{background:"none",border:"none",color:T.gray,cursor:"pointer",fontSize:13,marginBottom:20,display:"flex",alignItems:"center",gap:6}}>← Back to Leads</button>

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:14,marginBottom:24}}>
      <div>
        <h1 style={{color:T.white,fontSize:22,fontWeight:900,margin:0,fontFamily:"'Space Grotesk',sans-serif"}}>{permit.permit_number||"No Permit #"}</h1>
        <p style={{color:T.gray,fontSize:13,margin:"6px 0 10px"}}>{permit.address} · {permit.county} County FL</p>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {hurr&&<Tag type="hurricane"/>}
          {permit.status==="Applied"&&<Tag type="applied"/>}
          {permit.status==="Issued"&&<Tag type="issued"/>}
        </div>
      </div>
      <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 20px",textAlign:"center"}}>
        <div style={{color:T.gray,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Priority Score</div>
        <div style={{color:score>=8?T.hot:score>=5?T.warm:T.gray,fontSize:36,fontWeight:900,letterSpacing:-1}}>{score}</div>
        <div style={{color:score>=8?T.hot:score>=5?T.warm:T.gray,fontSize:12,fontWeight:700}}>{score>=8?"HOT":score>=5?"WARM":"COLD"}</div>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}}>
      <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:14,padding:22}}>
        <h3 style={{color:T.white,margin:"0 0 4px",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Permit Details</h3>
        <Field label="Permit Type" value={permit.permit_type}/>
        <Field label="Project Value" value={fmt(permit.project_value)}/>
        <Field label="Square Footage" value={permit.sqft?`${parseInt(permit.sqft).toLocaleString()} sqft`:null}/>
        <Field label="Date Filed" value={permit.date_filed}/>
        <Field label="Owner / Developer" value={permit.owner_name}/>
        <Field label="General Contractor" value={permit.gc_name}/>
        <Field label="GC Phone" value={permit.gc_phone}/>

        {/* FETCH LIVE DATA BUTTON */}
        <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${T.border}`}}>
          <button onClick={fetchLiveData} disabled={fetchingLive} style={{width:"100%",background:fetchingLive?"rgba(13,110,253,0.1)":"#0d6efd",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontWeight:700,fontSize:14,cursor:fetchingLive?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {fetchingLive
              ?<><span style={{width:15,height:15,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",display:"inline-block",animation:"spin 0.8s linear infinite"}}/> Buscando en DBPR y Sunbiz...</>
              :<>🔍 Fetch Live Data — GC &amp; Owner Info</>}
          </button>
          {fetchError&&<p style={{color:"#dc3545",fontSize:12,margin:"8px 0 0",textAlign:"center"}}>{fetchError}</p>}

          {liveData&&<div style={{marginTop:12,display:"flex",flexDirection:"column",gap:10}}>

            {/* GC from DBPR */}
            {liveData.gc
              ?<div style={{background:"rgba(13,110,253,0.07)",border:"1px solid rgba(13,110,253,0.22)",borderRadius:10,padding:14}}>
                  <div style={{color:"#0d6efd",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>✓ Contractor — DBPR Florida</div>
                  {[["Nombre",liveData.gc.name],["Licencia",`${liveData.gc.license} ${liveData.gc.type}`.trim()],["Estado",liveData.gc.status],["Dirección",liveData.gc.address]].filter(([,v])=>v).map(([label,val])=>
                    <div key={label} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${T.border}`}}>
                      <span style={{color:T.gray,fontSize:11}}>{label}</span>
                      <span style={{color:label==="Estado"?(val.toLowerCase().includes("active")?"#26a69a":"#dc3545"):"#1a2e42",fontSize:13,fontWeight:600,textAlign:"right",maxWidth:"60%"}}>{val}</span>
                    </div>
                  )}
                  {liveData.gc.phone&&<div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${T.border}`}}>
                    <span style={{color:T.gray,fontSize:11}}>Teléfono</span>
                    <a href={`tel:${liveData.gc.phone}`} style={{color:"#0d6efd",fontSize:13,fontWeight:700,textDecoration:"none"}}>📞 {liveData.gc.phone}</a>
                  </div>}
                  {liveData.gc.email&&<div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}>
                    <span style={{color:T.gray,fontSize:11}}>Email</span>
                    <a href={`mailto:${liveData.gc.email}`} style={{color:"#0d6efd",fontSize:13,fontWeight:700,textDecoration:"none"}}>✉ {liveData.gc.email}</a>
                  </div>}
                </div>
              :<div style={{background:"rgba(244,162,97,0.08)",border:"1px solid rgba(244,162,97,0.25)",borderRadius:10,padding:12}}>
                  <div style={{color:"#e67e22",fontWeight:700,fontSize:12,marginBottom:4}}>⚠ No encontrado automáticamente en DBPR</div>
                  <div style={{color:T.gray,fontSize:12}}>Buscá manualmente con los links de abajo</div>
                </div>
            }

            {/* Owner from PCPAO */}
            {liveData.pcpao&&<div style={{background:"rgba(38,166,154,0.07)",border:"1px solid rgba(38,166,154,0.22)",borderRadius:10,padding:14}}>
              <div style={{color:"#26a69a",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>✓ Propietario — PCPAO Pinellas</div>
              {liveData.pcpao.owner&&<div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${T.border}`}}>
                <span style={{color:T.gray,fontSize:11}}>Dueño</span>
                <span style={{color:"#1a2e42",fontSize:13,fontWeight:600}}>{liveData.pcpao.owner}</span>
              </div>}
              {liveData.pcpao.value&&<div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}>
                <span style={{color:T.gray,fontSize:11}}>Valor tasado</span>
                <span style={{color:"#1a2e42",fontSize:13,fontWeight:600}}>${parseInt(liveData.pcpao.value).toLocaleString()}</span>
              </div>}
            </div>}

            {/* Manual links */}
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <div style={{color:T.gray,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Búsqueda manual</div>
              {liveData.links.dbpr&&<a href={liveData.links.dbpr} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:"rgba(13,110,253,0.06)",color:"#0d6efd",border:"1px solid rgba(13,110,253,0.2)",borderRadius:8,padding:"9px 14px",textDecoration:"none",fontSize:12,fontWeight:600}}>🪪 DBPR — Licencia del GC ↗</a>}
              {liveData.links.sunbiz&&<a href={liveData.links.sunbiz} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:"rgba(244,162,97,0.06)",color:"#e67e22",border:"1px solid rgba(244,162,97,0.2)",borderRadius:8,padding:"9px 14px",textDecoration:"none",fontSize:12,fontWeight:600}}>🏢 Sunbiz — Empresa registrada ↗</a>}
              {liveData.links.pcpao&&<a href={liveData.links.pcpao} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:"rgba(38,166,154,0.06)",color:"#26a69a",border:"1px solid rgba(38,166,154,0.2)",borderRadius:8,padding:"9px 14px",textDecoration:"none",fontSize:12,fontWeight:600}}>🏠 Property Appraiser — Dueño ↗</a>}
              <a href={liveData.links.google} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:"rgba(0,0,0,0.03)",color:T.gray,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 14px",textDecoration:"none",fontSize:12,fontWeight:600}}>🔍 Google Search ↗</a>
            </div>
          </div>}
        </div>

        {permit.description&&<div style={{marginTop:14}}>
          <div style={{color:T.gray,fontSize:11,textTransform:"uppercase",letterSpacing:.8,marginBottom:8}}>Description</div>
          <div style={{color:T.grayLight,fontSize:13,lineHeight:1.6,background:"rgba(0,0,0,0.03)",borderRadius:8,padding:12}}>{permit.description}</div>
        </div>}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div style={{background:T.bgCard,border:`1px solid ${existing?T.green:T.border}`,borderRadius:14,padding:22}}>
          <h3 style={{color:T.white,margin:"0 0 16px",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>CRM Pipeline</h3>
          {existing&&<div style={{background:T.greenGlow,border:`1px solid ${T.green}`,borderRadius:8,padding:"8px 12px",marginBottom:12,color:T.green,fontSize:12,fontWeight:600}}>✓ In pipeline — Stage: {existing.stage} · Assigned: {existing.assigned_to}</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <div style={{color:T.gray,fontSize:11,marginBottom:5}}>Pipeline Stage</div>
              <Sel value={stage} onChange={setStage} options={STAGES} style={{width:"100%"}}/>
            </div>
            <div>
              <div style={{color:T.gray,fontSize:11,marginBottom:5}}>Assign To</div>
              <Sel value={assignTo} onChange={setAssignTo} options={["Emanuel","Gerardo","Unassigned"]} style={{width:"100%"}}/>
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{color:T.gray,fontSize:11,marginBottom:5}}>Sales Notes</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Add notes about this lead..." style={{width:"100%",background:"rgba(255,255,255,0.03)",color:T.white,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 12px",fontSize:13,resize:"vertical",minHeight:80,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <button onClick={handleSaveCRM} disabled={saving} style={{width:"100%",background:T.lime,color:"#fff",border:"none",borderRadius:10,padding:"12px",fontWeight:700,fontSize:14,cursor:"pointer",opacity:saving?0.7:1}}>
            {saving?"Saving...":"+ Save to Pipeline"}
          </button>
        </div>

        <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:14,padding:22}}>
          <h3 style={{color:T.white,margin:"0 0 14px",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Outreach</h3>
          <div style={{display:"flex",gap:10,marginBottom:showEmail?14:0}}>
            <button onClick={()=>setShowEmail(!showEmail)} style={{flex:1,background:"rgba(61,142,248,0.1)",color:T.blue,border:`1px solid rgba(61,142,248,0.3)`,borderRadius:10,padding:"11px",fontWeight:600,fontSize:13,cursor:"pointer"}}>✉ Generate Email</button>
            <button onClick={()=>copy(wa,"wa")} style={{flex:1,background:"rgba(46,213,115,0.1)",color:T.green,border:`1px solid rgba(46,213,115,0.3)`,borderRadius:10,padding:"11px",fontWeight:600,fontSize:13,cursor:"pointer"}}>{copied==="wa"?"✓ Copied!":"💬 WhatsApp"}</button>
          </div>
          {showEmail&&<div>
            <pre style={{background:"rgba(0,0,0,0.3)",border:`1px solid ${T.border}`,borderRadius:8,padding:14,color:T.grayLight,fontSize:11,whiteSpace:"pre-wrap",lineHeight:1.7,maxHeight:200,overflowY:"auto"}}>{email}</pre>
            <button onClick={()=>copy(email,"email")} style={{marginTop:10,width:"100%",background:T.lime,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontWeight:700,fontSize:13,cursor:"pointer"}}>{copied==="email"?"✓ Copied to clipboard!":"Copy Email"}</button>
          </div>}
        </div>

        {/* Quick Research Links */}
        <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:14,padding:22}}>
          <h3 style={{color:T.white,margin:"0 0 6px",fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Find Owner & GC Info</h3>
          <p style={{color:T.gray,fontSize:12,margin:"0 0 14px"}}>These CSVs don't include owner/GC data — open the official portals to get it</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {permit.permit_number&&(()=>{
              const county=(permit.county||"").toLowerCase();
              const permitUrl=county==="pinellas"
                ?`https://aca-prod.accela.com/pinellas/Cap/CapHome.aspx?module=Building&TabName=Building`
                :county==="hillsborough"
                ?`https://aca-prod.accela.com/hcfl/Cap/CapHome.aspx?module=Building&TabName=Building`
                :county==="osceola"
                ?`https://energovweb.osceola.org/EnerGov_Prod/SelfService#/search`
                :county==="seminole"
                ?`https://ssl.seminolecountyfl.gov/etrakit3/search/permit.aspx`
                :`https://aca-prod.accela.com/pinellas/Cap/CapHome.aspx?module=Building&TabName=Building`;
              const propUrl=county==="pinellas"
                ?`https://www.pcpao.gov/general-info/parcel-search?address=${encodeURIComponent(permit.address||"")}`
                :county==="hillsborough"
                ?`https://www.hcpafl.org/Property-Search?q=${encodeURIComponent(permit.address||"")}`
                :county==="osceola"
                ?`https://www.property-appraiser.org/search?query=${encodeURIComponent(permit.address||"")}`
                :`https://www.pcpao.gov/general-info/parcel-search?address=${encodeURIComponent(permit.address||"")}`;
              const licUrl=`https://www.myfloridalicense.com/wl11.asp?mode=0&cmd=LS&Lic_Name=${encodeURIComponent(permit.gc_name||"")}`;
              return<>
                <a href={permitUrl} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(61,142,248,0.08)",color:T.blue,border:`1px solid rgba(61,142,248,0.2)`,borderRadius:10,padding:"12px 16px",textDecoration:"none",fontWeight:600,fontSize:13}}>
                  <div>
                    <div>📋 Ver permiso completo</div>
                    <div style={{color:T.gray,fontSize:11,marginTop:2,fontWeight:400}}>Buscá el número: <strong style={{color:T.white}}>{permit.permit_number}</strong> — {permit.county} portal</div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span onClick={e=>{e.preventDefault();e.stopPropagation();try{navigator.clipboard.writeText(permit.permit_number||"");}catch(ex){const t=document.createElement("textarea");t.value=permit.permit_number||"";document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}alert("Número copiado: "+permit.permit_number);}} style={{background:"rgba(61,142,248,0.2)",color:T.blue,borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Copy #</span>
                    <span style={{fontSize:16}}>↗</span>
                  </div>
                </a>
                <a href={propUrl} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(200,224,0,0.06)",color:T.lime,border:`1px solid rgba(200,224,0,0.2)`,borderRadius:10,padding:"12px 16px",textDecoration:"none",fontWeight:600,fontSize:13}}>
                  <div>
                    <div>🏠 Ver dueño de la propiedad</div>
                    <div style={{color:T.gray,fontSize:11,marginTop:2,fontWeight:400}}>Nombre, dirección postal, valor — Property Appraiser</div>
                  </div>
                  <span style={{fontSize:16}}>↗</span>
                </a>
                {permit.gc_name&&<a href={licUrl} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,107,43,0.08)",color:T.hurricane,border:`1px solid rgba(255,107,43,0.2)`,borderRadius:10,padding:"12px 16px",textDecoration:"none",fontWeight:600,fontSize:13}}>
                  <div>
                    <div>🪪 Verificar licencia del GC</div>
                    <div style={{color:T.gray,fontSize:11,marginTop:2,fontWeight:400}}>{permit.gc_name} — Florida DBPR</div>
                  </div>
                  <span style={{fontSize:16}}>↗</span>
                </a>}
                <a href={`https://www.google.com/search?q=${encodeURIComponent((permit.gc_name||permit.owner_name||"")+" Florida contractor steel framing")}`} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.03)",color:T.grayLight,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 16px",textDecoration:"none",fontWeight:600,fontSize:13}}>
                  <div>
                    <div>🔍 Buscar en Google</div>
                    <div style={{color:T.gray,fontSize:11,marginTop:2,fontWeight:400}}>{permit.gc_name||permit.owner_name||permit.address}</div>
                  </div>
                  <span style={{fontSize:16}}>↗</span>
                </a>
              </>;
            })()}
          </div>
        </div>
      </div>
    </div>

    {/* Property Map */}
    <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:14,overflow:"hidden"}}>
      <div style={{padding:"14px 18px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <h3 style={{color:T.white,margin:0,fontSize:14,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Property Location</h3>
          <div style={{color:T.gray,fontSize:12,marginTop:3}}>{permit.address}</div>
        </div>
        <a href={`https://www.google.com/maps/search/${encodeURIComponent(permit.address+", Florida")}`} target="_blank" rel="noreferrer" style={{background:"rgba(61,142,248,0.1)",color:T.blue,border:`1px solid rgba(61,142,248,0.3)`,borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,textDecoration:"none"}}>
          Open in Google Maps ↗
        </a>
      </div>
      <div ref={mapRef} style={{width:"100%",height:300}}/>
    </div>
  </div>;
}

// ── INTEL MAP ─────────────────────────────────────────────────────────────────
function IntelMap({permits,onSelect}){
  const[filter,setFilter]=useState("all");
  const[selected,setSelected]=useState(null);
  const mapRef=useRef(null);
  const leafletRef=useRef(null);
  const markersRef=useRef([]);

  const clusters=useMemo(()=>{
    const src=filter==="hurricane"?permits.filter(isHurricane):filter==="hot"?permits.filter(p=>scorePermit(p)>=8):permits;
    const map={};
    src.forEach(p=>{
      const r=getCityCoords(p.address);
      if(!r)return;
      const key=`${r.coords[0].toFixed(2)}_${r.coords[1].toFixed(2)}`;
      if(!map[key])map[key]={lat:r.coords[0],lng:r.coords[1],city:r.city,permits:[]};
      map[key].permits.push(p);
    });
    return Object.values(map).sort((a,b)=>b.permits.length-a.permits.length);
  },[permits,filter]);

  const hC=permits.filter(isHurricane).length;
  const hotC=permits.filter(p=>scorePermit(p)>=8).length;

  // Init Leaflet map
  useEffect(()=>{
    if(!window.L||!mapRef.current)return;
    if(leafletRef.current)return;
    const map=window.L.map(mapRef.current,{
      center:[27.8,-82.6],
      zoom:9,
      zoomControl:true,
      scrollWheelZoom:true,
    });
    window.L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
      attribution:'© OpenStreetMap © CARTO',
      subdomains:"abcd",maxZoom:19,
    }).addTo(map);
    leafletRef.current=map;
    return()=>{if(leafletRef.current){leafletRef.current.remove();leafletRef.current=null;}};
  },[]);

  // Update markers when clusters change
  useEffect(()=>{
    const map=leafletRef.current;
    if(!map||!window.L)return;
    // Clear old markers
    markersRef.current.forEach(m=>m.remove());
    markersRef.current=[];
    if(clusters.length===0)return;
    const maxC=Math.max(...clusters.map(c=>c.permits.length),1);
    clusters.forEach((c,i)=>{
      const hurr=c.permits.some(isHurricane);
      const hot=c.permits.some(p=>scorePermit(p)>=8);
      const color=filter==="hurricane"?"#e76f51":filter==="hot"?"#e63946":hurr?"#e76f51":hot?"#e63946":"#0d6efd";
      const size=Math.max(32,Math.min(80,Math.round((c.permits.length/maxC)*80)+20));
      const label=c.permits.length>999?`${(c.permits.length/1000).toFixed(1)}k`:c.permits.length;
      const icon=window.L.divIcon({
        className:"",
        html:`<div style="width:${size}px;height:${size}px;background:${color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:${size>50?12:10}px;color:#ffffff;box-shadow:0 0 ${size/2}px ${color}66;border:2px solid ${color};cursor:pointer;font-family:Inter,sans-serif">${label}</div>`,
        iconSize:[size,size],iconAnchor:[size/2,size/2],
      });
      // Store permits ref for popup clicks
      window._yeahradarPermits=clusters.reduce((acc,c)=>{c.permits.forEach(p=>{acc[p.id]=p;});return acc;},{});
      window._yeahradarOnSelect=onSelect;

      const marker=window.L.marker([c.lat,c.lng],{icon}).addTo(map);
      marker.bindPopup(`
        <div style="font-family:Inter,sans-serif;min-width:220px">
          <div style="font-weight:800;font-size:15px;margin-bottom:4px">${c.city}</div>
          <div style="color:#666;font-size:12px;margin-bottom:8px">${c.permits.length.toLocaleString()} permits</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
            <span style="background:#ff6b2b22;color:#ff6b2b;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">🌀 ${c.permits.filter(isHurricane).length} hurricane</span>
            <span style="background:#ff475722;color:#ff4757;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">🔥 ${c.permits.filter(p=>scorePermit(p)>=8).length} hot</span>
          </div>
          <div style="border-top:1px solid #eee;padding-top:8px">
            ${c.permits.slice(0,4).map(p=>`
              <div onclick="window._yeahradarOnSelect(window._yeahradarPermits['${p.id}'])" style="padding:6px 8px;margin-bottom:4px;border-radius:6px;cursor:pointer;border:1px solid #d4e2ef;background:#f7fafd" onmouseover="this.style.background='#e8f1fb';this.style.borderColor='#0d6efd'" onmouseout="this.style.background='#f9f9f9';this.style.borderColor='#d4e2ef'">
                <div style="font-size:11px;font-weight:700;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.address?.slice(0,34)||"—"}</div>
                <div style="font-size:10px;color:#888;margin-top:2px">${p.permit_type?.slice(0,30)||""} · ${isHurricane(p)?"🌀 ":""}Score ${scorePermit(p)} → <span style="color:#0d6efd;font-weight:700">View →</span></div>
              </div>
            `).join("")}
            ${c.permits.length>4?`<div style="font-size:11px;color:#999;text-align:center;padding:4px">+${c.permits.length-4} more in list →</div>`:""}
          </div>
        </div>
      `,{maxWidth:280});
      marker.on("click",()=>setSelected(i));
      markersRef.current.push(marker);
    });
    // Fit map to markers
    if(clusters.length>0){
      const bounds=window.L.latLngBounds(clusters.map(c=>[c.lat,c.lng]));
      map.fitBounds(bounds,{padding:[40,40],maxZoom:11});
    }
  },[clusters,filter]);

  return<div style={{padding:"28px 36px",height:"100%",background:T.bg,display:"flex",flexDirection:"column"}} className="animate-in">
    <div style={{marginBottom:16}}>
      <h1 style={{color:T.white,fontSize:24,fontWeight:900,margin:0,fontFamily:"'Space Grotesk',sans-serif",letterSpacing:-0.5}}>Radar Map</h1>
      <p style={{color:T.gray,fontSize:13,margin:"4px 0 0"}}>{permits.length.toLocaleString()} permits · Click any cluster to see details</p>
    </div>
    <div style={{display:"flex",gap:10,marginBottom:14}}>
      {[["all",`All (${permits.length.toLocaleString()})`,T.lime],["hurricane",`🌀 Hurricane (${hC.toLocaleString()})`,T.hurricane],["hot",`🔥 HOT (${hotC.toLocaleString()})`,T.hot]].map(([k,l,col])=>(
        <button key={k} onClick={()=>{setFilter(k);setSelected(null);}} style={{background:filter===k?col+"22":T.bgCard,color:filter===k?col:T.gray,border:`1px solid ${filter===k?col:T.border}`,borderRadius:10,padding:"8px 18px",fontSize:13,cursor:"pointer",fontWeight:600,transition:"all 0.15s"}}>{l}</button>
      ))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 260px",gap:16,flex:1,minHeight:0}}>
      <div style={{borderRadius:14,overflow:"hidden",border:`1px solid ${T.border}`,position:"relative"}}>
        <div ref={mapRef} style={{width:"100%",height:"100%",minHeight:480}}/>
      </div>
      <div style={{overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>
        {selected!==null&&clusters[selected]?(<>
          <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:T.gray,cursor:"pointer",fontSize:12,textAlign:"left",padding:"0 0 4px",display:"flex",alignItems:"center",gap:4}}>← All cities</button>
          <div style={{background:T.bgCard,border:`1px solid ${T.lime}`,borderRadius:12,padding:16,marginBottom:4}}>
            <div style={{color:T.white,fontWeight:700,fontSize:16,fontFamily:"'Space Grotesk',sans-serif"}}>{clusters[selected].city}</div>
            <div style={{color:T.lime,fontSize:30,fontWeight:900,margin:"6px 0 2px",letterSpacing:-1}}>{clusters[selected].permits.length.toLocaleString()}</div>
            <div style={{color:T.gray,fontSize:12,marginBottom:12}}>permits</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <span style={{background:T.hurricaneGlow,color:T.hurricane,fontSize:11,padding:"3px 10px",borderRadius:6,fontWeight:700}}>🌀 {clusters[selected].permits.filter(isHurricane).length}</span>
              <span style={{background:T.hotGlow,color:T.hot,fontSize:11,padding:"3px 10px",borderRadius:6,fontWeight:700}}>🔥 {clusters[selected].permits.filter(p=>scorePermit(p)>=8).length} hot</span>
            </div>
          </div>
          {clusters[selected].permits.slice(0,8).map((p,i)=>(
            <div key={i} onClick={()=>onSelect(p)} style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 12px",cursor:"pointer",transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=T.lime;e.currentTarget.style.background=T.bgCardHover;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.background=T.bgCard;}}>
              <div style={{color:T.white,fontSize:11,fontWeight:600,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.address?.slice(0,32)||"—"}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:5,alignItems:"center"}}><ScorePill score={scorePermit(p)}/>{isHurricane(p)&&<span style={{color:T.hurricane,fontSize:10}}>🌀</span>}</div>
                <span style={{color:T.lime,fontSize:10,fontWeight:700}}>View →</span>
              </div>
            </div>
          ))}
          {clusters[selected].permits.length>8&&<div style={{color:T.gray,fontSize:12,textAlign:"center",padding:"6px 0"}}>+{clusters[selected].permits.length-8} more — use Opportunities to see all</div>}
        </>):(
          clusters.slice(0,16).map((c,i)=>(
            <div key={i} onClick={()=>{setSelected(i);leafletRef.current?.setView([c.lat,c.lng],12);}} style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.lime;e.currentTarget.style.background=T.bgCardHover;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.background=T.bgCard;}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <span style={{color:T.white,fontWeight:600,fontSize:13}}>{c.city}</span>
                <span style={{color:T.lime,fontWeight:900,fontSize:14}}>{c.permits.length.toLocaleString()}</span>
              </div>
              <div style={{display:"flex",gap:8,marginBottom:5}}>
                {c.permits.some(isHurricane)&&<span style={{color:T.hurricane,fontSize:11}}>🌀 {c.permits.filter(isHurricane).length}</span>}
                {c.permits.filter(p=>scorePermit(p)>=8).length>0&&<span style={{color:T.hot,fontSize:11}}>🔥 {c.permits.filter(p=>scorePermit(p)>=8).length}</span>}
              </div>
              <div style={{background:T.border,borderRadius:3,height:3}}><div style={{width:`${(c.permits.length/clusters[0].permits.length)*100}%`,background:`linear-gradient(90deg,${T.lime},${T.blue})`,height:"100%",borderRadius:3}}/></div>
            </div>
          ))
        )}
      </div>
    </div>
  </div>;
}

// ── PIPELINE ──────────────────────────────────────────────────────────────────
function Pipeline({crmLeads,onUpdate,permits}){
  const totalVal=crmLeads.reduce((s,l)=>s+(parseFloat(l.permits?.project_value)||parseFloat(l._permitValue)||0),0);
  const wonVal=crmLeads.filter(l=>l.stage==="Won").reduce((s,l)=>s+(parseFloat(l.permits?.project_value)||parseFloat(l._permitValue)||0),0);

  return<div style={{padding:"28px 36px",overflowY:"auto",height:"100%",background:T.bg}} className="animate-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
      <div>
        <h1 style={{color:T.white,fontSize:24,fontWeight:900,margin:0,fontFamily:"'Space Grotesk',sans-serif",letterSpacing:-0.5}}>Pipeline</h1>
        <p style={{color:T.gray,fontSize:13,margin:"4px 0 0"}}>{crmLeads.length} leads · Pipeline: {fmt(totalVal)}</p>
      </div>
      {wonVal>0&&<div style={{background:T.greenGlow,border:`1px solid ${T.green}`,borderRadius:12,padding:"12px 20px",textAlign:"center"}}>
        <div style={{color:T.gray,fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Won</div>
        <div style={{color:T.green,fontSize:22,fontWeight:900,letterSpacing:-1}}>{fmt(wonVal)}</div>
      </div>}
    </div>

    <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:16}}>
      {STAGES.map(s=>{
        const leads=crmLeads.filter(l=>l.stage===s);
        const val=leads.reduce((sum,l)=>sum+(parseFloat(l.permits?.project_value)||parseFloat(l._permitValue)||0),0);
        const stageColor=s==="Won"?T.green:s==="Lost"?T.hot:s==="New"?T.blue:s==="Contacted"?T.warm:T.grayLight;
        return<div key={s} style={{minWidth:210,flex:"0 0 210px"}}>
          <div style={{background:T.bgCard,border:`1px solid ${s==="Won"?T.green:s==="Lost"?T.hot:T.border}`,borderRadius:14,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{color:stageColor,fontWeight:700,fontSize:13}}>{s}</span>
              <span style={{background:"rgba(255,255,255,0.05)",color:T.gray,fontSize:11,padding:"2px 10px",borderRadius:10,fontWeight:600}}>{leads.length}</span>
            </div>
            {val>0&&<div style={{color:T.lime,fontSize:12,fontWeight:700,marginBottom:10}}>{fmt(val)}</div>}
            <div style={{height:2,background:T.border,borderRadius:2,marginBottom:12}}><div style={{width:`${Math.min(100,(leads.length/Math.max(crmLeads.length,1))*100*STAGES.length)}%`,background:stageColor,height:"100%",borderRadius:2}}/></div>
            {leads.map((l,i)=>(
              <div key={i} style={{background:"rgba(0,0,0,0.2)",border:`1px solid ${T.border}`,borderRadius:10,padding:12,marginBottom:8}}>
                <div style={{color:T.white,fontWeight:600,fontSize:11,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.permits?.address||l._address||"Unknown"}</div>
                <div style={{color:T.gray,fontSize:10,marginBottom:6}}>{l.permits?.county||l._county} · {l.assigned_to}</div>
                {(l.permits?.project_value||l._permitValue)&&<div style={{color:T.lime,fontWeight:700,fontSize:12,marginBottom:6}}>{fmt(l.permits?.project_value||l._permitValue)}</div>}
                <select value={l.stage} onChange={e=>onUpdate(l.id,e.target.value)} style={{width:"100%",background:T.bgCard,color:T.white,border:`1px solid ${T.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>
                  {STAGES.map(st=><option key={st} value={st}>{st}</option>)}
                </select>
              </div>
            ))}
            {leads.length===0&&<div style={{color:T.gray,fontSize:12,textAlign:"center",padding:"20px 0",opacity:.6}}>No leads</div>}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ── DATA SYNC ─────────────────────────────────────────────────────────────────
function DataSync({permitCount,countyStats,onImport}){
  const[dragging,setDragging]=useState(false);
  const[preview,setPreview]=useState(null);
  const[importing,setImporting]=useState(false);
  const[progress,setProgress]=useState(0);
  const[msg,setMsg]=useState(null);

  const handleFiles=files=>{
    const allPreviews=[];
    let processed=0;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=e=>{
        const records=parseCSV(e.target.result);
        if(records.length>0){
          const county=detectCounty(file.name,records);
          const fn=file.name.toLowerCase();
          const permitType=fn.includes("storm")?"Storm Damage":fn.includes("commercial")?"Commercial New Construction":"Residential New Construction";
          const mapped=records.map(r=>mapCSVRecord(r,county,permitType)).filter(r=>r.permit_number||r.address);
          allPreviews.push({filename:file.name,county,records:mapped,size:records.length});
        }
        processed++;
        if(processed===files.length){
          // Merge all into one preview
          const total=allPreviews.reduce((s,p)=>s+p.records.length,0);
          const allRecords=allPreviews.flatMap(p=>p.records);
          const counties=[...new Set(allPreviews.map(p=>p.county))].join(", ");
          setPreview({filename:`${files.length} files`,county:counties,records:allRecords,size:total,breakdown:allPreviews});
        }
      };
      reader.readAsText(file);
    });
  };

  const handleFile=file=>handleFiles([file]);

  const fixCountyFromAddress=(address)=>{
    if(!address)return null;
    const u=address.toUpperCase();
    // ZIP code detection
    const zipMatch=u.match(/FL\s+(\d{5})/);
    if(zipMatch){
      const zip=parseInt(zipMatch[1]);
      const PINELLAS_ZIPS=[[33701,33716],[33755,33786],[33601,33601],[33620,33620],[33629,33629],[33680,33689],[33694,33694]];
      const HILLS_ZIPS=[[33602,33619],[33621,33628],[33630,33647],[33650,33629],[33655,33679],[33690,33694],[33755,33755]];
      const ORANGE_ZIPS=[[32801,32839],[32853,32862],[32869,32878],[32885,32887]];
      const OSCEOLA_ZIPS=[[34741,34747],[34758,34758],[34769,34773]];
      if(PINELLAS_ZIPS.some(([a,b])=>zip>=a&&zip<=b))return"Pinellas";
      if(HILLS_ZIPS.some(([a,b])=>zip>=a&&zip<=b))return"Hillsborough";
      if(ORANGE_ZIPS.some(([a,b])=>zip>=a&&zip<=b))return"Orange";
      if(OSCEOLA_ZIPS.some(([a,b])=>zip>=a&&zip<=b))return"Osceola";
    }
    // City name detection
    const PINELLAS=["CLEARWATER","LARGO","TARPON SPRINGS","DUNEDIN","PALM HARBOR","SAFETY HARBOR","OLDSMAR","PINELLAS PARK","ST. PETE","ST PETE","SAINT PETE","BELLEAIR","GULFPORT","TREASURE ISLAND","MADEIRA BEACH","INDIAN ROCKS","REDINGTON","TIERRA VERDE","KENNETH CITY","SEMINOLE FL"];
    const HILLS=["TAMPA","BRANDON","RIVERVIEW","WESLEY CHAPEL","PLANT CITY","GIBSONTON","RUSKIN","SEFFNER","VALRICO","APOLLO BEACH","WIMAUMA","LUTZ","LAND O LAKES","THONOTOSASSA"];
    const ORANGE=["ORLANDO","WINTER PARK","APOPKA","WINTER GARDEN","WINDERMERE","OCOEE","EDGEWOOD","MAITLAND"];
    const OSCEOLA=["KISSIMMEE","ST. CLOUD","SAINT CLOUD","POINCIANA","CELEBRATION","HARMONY"];
    const SEMINOLE=["SANFORD","ALTAMONTE SPRINGS","CASSELBERRY","LAKE MARY","LONGWOOD","OVIEDO","WINTER SPRINGS"];
    if(PINELLAS.some(c=>u.includes(c)))return"Pinellas";
    if(HILLS.some(c=>u.includes(c)))return"Hillsborough";
    if(ORANGE.some(c=>u.includes(c)))return"Orange";
    if(OSCEOLA.some(c=>u.includes(c)))return"Osceola";
    if(SEMINOLE.some(c=>u.includes(c)))return"Seminole";
    return null;
  };

  const confirmImport=async()=>{
    if(!preview)return;
    setImporting(true);setProgress(0);

    // Fix any Unknown counties before importing
    const fixedRecords=preview.records.map(r=>{
      if(!r.county||r.county==="Unknown"){
        const detected=fixCountyFromAddress(r.address);
        if(detected)return{...r,county:detected};
      }
      return r;
    });

    const CHUNK=500;
    const chunks=[];
    for(let i=0;i<fixedRecords.length;i+=CHUNK)chunks.push(fixedRecords.slice(i,i+CHUNK));
    let added=0;
    for(let i=0;i<chunks.length;i++){
      const chunk=chunks[i];
      const{error}=await sb.from("permits").upsert(chunk,{onConflict:"id",ignoreDuplicates:true});
      if(!error)added+=chunk.length;
      setProgress(Math.round(((i+1)/chunks.length)*100));
    }

    // Auto-fix existing Unknown records in Supabase
    setMsg({type:"info",text:"Fixing Unknown county records in database..."});
    const{data:unknowns}=await sb.from("permits").select("id,address").eq("county","Unknown").limit(5000);
    if(unknowns&&unknowns.length>0){
      const updates=unknowns
        .map(p=>({id:p.id,county:fixCountyFromAddress(p.address)||"Unknown"}))
        .filter(p=>p.county!=="Unknown");
      if(updates.length>0){
        for(let i=0;i<updates.length;i+=500){
          await sb.from("permits").upsert(updates.slice(i,i+500),{onConflict:"id"});
        }
      }
    }

    await onImport();
    const unknownCount=fixedRecords.filter(r=>r.county==="Unknown").length;
    setMsg({type:"success",text:`✓ Imported ${added.toLocaleString()} permits · ${unknowns?.length||0} Unknown records fixed automatically`});
    setPreview(null);setImporting(false);setProgress(0);
  };

  const syncOrlando=async()=>{
    setMsg({type:"info",text:"Fetching from Orlando Open Data..."});
    try{
      const res=await fetch("https://data.cityoforlando.net/resource/ryhf-m453.json?$limit=500&$order=processed_date+DESC");
      const data=await res.json();
      const mapped=data.map(r=>{
        const desc=r.worktype||"";
        const hurr=HURRICANE_KW.some(k=>desc.toLowerCase().includes(k));
        const permit={id:(r.permit_number||Math.random().toString(36))+"_"+(r.permit_address||"").slice(0,30),permit_number:r.permit_number,address:r.permit_address,city:"Orlando",county:"Orange",permit_type:r.application_type,description:desc,status:r.application_status,date_filed:r.processed_date,project_value:parseFloat(r.estimated_cost)||null,sqft:parseFloat(r.square_footage)||null,owner_name:r.property_owner_name,gc_name:r.contractor_name,gc_phone:r.contractor_phone_number,source:"API",is_hurricane:hurr,score:0};
        permit.score=scorePermit(permit);
        return permit;
      });
      const{error}=await sb.from("permits").upsert(mapped,{onConflict:"id",ignoreDuplicates:true});
      if(error)throw error;
      await onImport();
      setMsg({type:"success",text:`✓ Synced ${mapped.length} permits from City of Orlando`});
    }catch(e){setMsg({type:"error",text:"Orlando API error: "+e.message});}
  };

  const portals=[
    {name:"Orange County / Orlando",type:"Live API",color:T.green,action:"sync"},
    {name:"Pinellas County",type:"CSV Only",color:T.warm,url:"https://aca-prod.accela.com/pinellas/Cap/CapHome.aspx?module=Building&TabName=Building"},
    {name:"Hillsborough County",type:"CSV Only",color:T.warm,url:"https://aca-prod.accela.com/hcfl/Cap/CapHome.aspx?module=Building&TabName=Building"},
    {name:"Sarasota County",type:"CSV Only",color:T.warm,url:"https://aca-prod.accela.com/SARASOTACO/Cap/CapHome.aspx?module=Building&TabName=Building"},
    {name:"Manatee County",type:"CSV Only",color:T.warm,url:"https://www.mymanatee.org/departments/building___development_services/building_permits"},
    {name:"Lee County",type:"CSV Only",color:T.warm,url:"https://www.leegov.com/dcd/building/permits"},
