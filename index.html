function App(){
  const[page,setPage]=useState("dashboard");
  const[permits,setPermits]=useState([]);
  const[crmLeads,setCrmLeads]=useState([]);
  const[selectedLead,setSelectedLead]=useState(null);
  const[loading,setLoading]=useState(true);
  const[loadMsg,setLoadMsg]=useState("Connecting to database...");
  const[user,setUser]=useState(null);
  const[industry,setIndustry]=useState(null);

  const loadData=useCallback(async()=>{
    try{
      setLoadMsg("Loading permits...");
      // Load all permits in chunks of 1000 (Supabase default limit)
      let allPermits=[];
      let from=0;
      const chunkSize=1000;
      while(true){
        const{data:chunk,error:pe}=await sb.from("permits").select("id,permit_number,address,city,county,permit_type,description,status,date_filed,project_value,sqft,owner_name,gc_name,gc_phone,is_hurricane,score").range(from,from+chunkSize-1);
        if(pe)throw pe;
        if(!chunk||chunk.length===0)break;
        allPermits=[...allPermits,...chunk];
        setLoadMsg(`Loading permits... ${allPermits.length.toLocaleString()}`);
        if(chunk.length<chunkSize)break;
        from+=chunkSize;
      }
      const p=allPermits;
      setPermits(p||[]);
      setLoadMsg("Loading pipeline...");
      const{data:c,error:ce}=await sb.from("crm_leads").select("*, permits(address,county,project_value)").order("created_at",{ascending:false});
      if(ce)throw ce;
      setCrmLeads(c||[]);
    }catch(e){
      console.error("Load error:",e);
      setLoadMsg("Connection error — check Supabase");
    }
    setLoading(false);
  },[]);

  // Check existing session
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user)setUser(session.user);
      else setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session?.user)setUser(session.user);
      else{setUser(null);setLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{if(user)loadData();},[user,loadData]);

  // Filter permits by industry
  const filteredPermits=useMemo(()=>{
    if(!industry||industry==="construction")return permits;
    if(industry==="roofing"){
      const kw=["roof","reroof","shingle","flat roof","hurricane","storm damage","sda","sde","substantial damage"];
      return permits.filter(p=>kw.some(k=>(p.permit_type||"").toLowerCase().includes(k)||(p.description||"").toLowerCase().includes(k)));
    }
    if(industry==="energy"){
      return permits.filter(p=>["Commercial New Construction","Commercial Addition","Commercial Building Other","Industrial"].some(t=>(p.permit_type||"").includes(t)));
    }
    return permits;
  },[permits,industry]);

  const[dashFilter,setDashFilter]=useState(null);
  const handleLogout=async()=>{
    await sb.auth.signOut();
    setUser(null);setIndustry(null);setPermits([]);setCrmLeads([]);
  };

  // Auto-fix Unknown counties silently in background
  useEffect(()=>{
    if(permits.length===0)return;
    const unknowns=permits.filter(p=>!p.county||p.county==="Unknown"||p.county==="");
    if(unknowns.length===0)return;
    // Fix each unknown by reading its address
    const fixes=unknowns.map(p=>{
      const addr=(p.address||"").toUpperCase();
      const PINELLAS=["CLEARWATER","PINELLAS PARK","ST. PETE","SAINT PETE","ST PETE","TARPON SPRINGS","DUNEDIN","LARGO","INDIAN ROCKS","REDINGTON","TREASURE ISLAND","MADEIRA BEACH","PALM HARBOR","SAFETY HARBOR","OLDSMAR","BELLEAIR","GULFPORT","TIERRA VERDE","KENNETH CITY","SEMINOLE FL"];
      const HILLS=["TAMPA","BRANDON","RIVERVIEW","WESLEY CHAPEL","PLANT CITY","GIBSONTON","RUSKIN","SEFFNER","VALRICO","APOLLO BEACH","WIMAUMA","LUTZ","LAND O LAKES","THONOTOSASSA"];
      const ORANGE=["ORLANDO","WINTER PARK","APOPKA","WINTER GARDEN","OCOEE","WINDERMERE","MAITLAND","CASSELBERRY","ALTAMONTE","LONGWOOD","LAKE MARY","SANFORD"];
      const OSCEOLA=["KISSIMMEE","ST. CLOUD","SAINT CLOUD","POINCIANA","CELEBRATION","HARMONY"];
      const MANATEE=["BRADENTON","PALMETTO","ANNA MARIA","HOLMES BEACH","PARRISH","ELLENTON","LAKEWOOD RANCH"];
      const SARASOTA=["SARASOTA","VENICE","NORTH PORT","ENGLEWOOD","OSPREY","NOKOMIS"];
      const PASCO=["NEW PORT RICHEY","HOLIDAY","HUDSON","ZEPHYRHILLS","DADE CITY","LAND O LAKES","WESLEY CHAPEL FL"];
      const LEE=["FORT MYERS","CAPE CORAL","BONITA SPRINGS","ESTERO","LEHIGH ACRES","SANIBEL","PINE ISLAND"];
      // ZIP code lookup
      const zipMatch=addr.match(/FL\s+(\d{5})/);
      const zip=zipMatch?parseInt(zipMatch[1]):0;
      let county="Unknown";
      if(PINELLAS.some(c=>addr.includes(c))||(zip>=33701&&zip<=33786))county="Pinellas";
      else if(HILLS.some(c=>addr.includes(c))||(zip>=33602&&zip<=33619)||(zip>=33629&&zip<=33647)||(zip>=33510&&zip<=33599))county="Hillsborough";
      else if(ORANGE.some(c=>addr.includes(c))||(zip>=32801&&zip<=32839)||(zip>=32859&&zip<=32899))county="Orange";
      else if(OSCEOLA.some(c=>addr.includes(c))||(zip>=34741&&zip<=34773))county="Osceola";
      else if(MANATEE.some(c=>addr.includes(c))||(zip>=34201&&zip<=34299))county="Manatee";
      else if(SARASOTA.some(c=>addr.includes(c))||(zip>=34229&&zip<=34293))county="Sarasota";
      else if(PASCO.some(c=>addr.includes(c))||(zip>=33523&&zip<=33576))county="Pasco";
      else if(LEE.some(c=>addr.includes(c))||(zip>=33901&&zip<=33999))county="Lee";
      return{id:p.id,county};
    }).filter(f=>f.county!=="Unknown");
    if(fixes.length===0)return;
    // Update in Supabase in background, no UI feedback needed
    (async()=>{
      const CHUNK=50;
      for(let i=0;i<fixes.length;i+=CHUNK){
        const chunk=fixes.slice(i,i+CHUNK);
        await Promise.all(chunk.map(f=>sb.from("permits").update({county:f.county}).eq("id",f.id)));
      }
      // Update local state silently
      setPermits(prev=>prev.map(p=>{
        const fix=fixes.find(f=>f.id===p.id);
        return fix?{...p,county:fix.county}:p;
      }));
    })();
  },[permits]);

  const handleAddToCRM=async lead=>{
    const{data,error}=await sb.from("crm_leads").upsert({...lead,updated_at:new Date().toISOString()},{onConflict:"permit_id"}).select();
    if(!error&&data)setCrmLeads(prev=>[...prev.filter(l=>l.permit_id!==lead.permit_id),...data]);
  };

  const handleUpdateLead=async(id,newStage)=>{
    const{error}=await sb.from("crm_leads").update({stage:newStage,updated_at:new Date().toISOString()}).eq("id",id);
    if(!error)setCrmLeads(prev=>prev.map(l=>l.id===id?{...l,stage:newStage}:l));
  };

  const[showReset,setShowReset]=useState(false);
  const[resetMsg,setResetMsg]=useState("");
  const[resetting,setResetting]=useState(false);

  const handleReset=async(type,county=null)=>{
    setResetting(true);
    setResetMsg(type==="county"?`Borrando ${county}...`:type==="permits"?"Borrando todos los permits...":"Borrando todo...");
    try{
      if(type==="county"){
        await sb.from("permits").delete().eq("county",county);
      }else if(type==="permits"){
        await sb.from("permits").delete().neq("id","__never__");
      }else if(type==="all"){
        await sb.from("crm_leads").delete().neq("id","00000000-0000-0000-0000-000000000000");
        await sb.from("permits").delete().neq("id","__never__");
      }
      await loadData();
      setShowReset(false);
    }catch(e){setResetMsg("Error: "+e.message);}
    setResetting(false);
  };

  const countyStats={};
  permits.forEach(p=>{countyStats[p.county]=(countyStats[p.county]||0)+1;});
  const hotCount=filteredPermits.filter(p=>scorePermit(p)>=8).length;

  const ResetModal=()=><div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>!resetting&&setShowReset(false)}>
    <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:16,padding:28,width:480,maxWidth:"90vw"}} onClick={e=>e.stopPropagation()}>
      <h2 style={{color:T.white,fontFamily:"'Space Grotesk',sans-serif",fontSize:20,fontWeight:800,margin:"0 0 6px"}}>Gestionar datos</h2>
      <p style={{color:T.gray,fontSize:13,margin:"0 0 24px"}}>Elegí qué querés borrar de Supabase</p>

      {/* By county */}
      <div style={{marginBottom:20}}>
        <div style={{color:T.grayLight,fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Borrar por condado</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {Object.entries(countyStats).sort((a,b)=>b[1]-a[1]).map(([county,count])=>(
            <button key={county} disabled={resetting} onClick={()=>{if(window.confirm(`Borrar ${count.toLocaleString()} permits de ${county}?`))handleReset("county",county);}} style={{background:"rgba(255,71,87,0.08)",color:T.hot,border:`1px solid rgba(255,71,87,0.25)`,borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>
              {county} <span style={{opacity:.7}}>({count.toLocaleString()})</span>
            </button>
          ))}
        </div>
      </div>

      <div style={{height:1,background:T.border,margin:"0 0 20px"}}/>

      {/* Full resets */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <button disabled={resetting} onClick={()=>{if(window.confirm(`Borrar todos los ${permits.length.toLocaleString()} permits? El pipeline CRM se mantiene.`))handleReset("permits");}} style={{background:"rgba(255,165,2,0.08)",color:T.warm,border:`1px solid rgba(255,165,2,0.25)`,borderRadius:10,padding:"12px 16px",cursor:"pointer",fontWeight:600,fontSize:13,textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div>Borrar todos los permits</div>
            <div style={{color:T.gray,fontSize:11,marginTop:2,fontWeight:400}}>Mantiene el pipeline CRM intacto</div>
          </div>
          <span style={{fontSize:20}}>🗂️</span>
        </button>
        <button disabled={resetting} onClick={()=>{if(window.confirm("Borrar TODO — permits + pipeline CRM completo? Esta acción no se puede deshacer."))handleReset("all");}} style={{background:"rgba(255,71,87,0.08)",color:T.hot,border:`1px solid rgba(255,71,87,0.25)`,borderRadius:10,padding:"12px 16px",cursor:"pointer",fontWeight:600,fontSize:13,textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div>Borrar todo — reset completo</div>
            <div style={{color:T.gray,fontSize:11,marginTop:2,fontWeight:400}}>Permits + Pipeline CRM. No se puede deshacer.</div>
          </div>
          <span style={{fontSize:20}}>⚠️</span>
        </button>
      </div>

      {resetMsg&&<div style={{marginTop:14,color:resetting?T.lime:T.hot,fontSize:13,fontWeight:600}}>{resetMsg}</div>}

      <button disabled={resetting} onClick={()=>setShowReset(false)} style={{marginTop:20,background:"transparent",color:T.gray,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 20px",cursor:"pointer",fontSize:13,width:"100%"}}>Cancelar</button>
    </div>
  </div>;

  const nav=[
    {id:"dashboard",icon:Icon.dash,label:"Dashboard"},
    {id:"leads",icon:Icon.leads,label:"Opportunities"},
    {id:"map",icon:Icon.map,label:"Radar Map"},
    {id:"pipeline",icon:Icon.pipe,label:"Pipeline",badge:crmLeads.length},
    {id:"sync",icon:Icon.sync,label:"Data Sync"},
  ];

  if(loading)return<div style={{display:"flex",height:"100vh",background:T.bg,alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
    <div style={{position:"relative",width:60,height:60}}>
      <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`2px solid ${T.border}`}}/>
      <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`2px solid ${T.lime}`,borderTopColor:"transparent",animation:"spin 1s linear infinite"}}/>
    </div>
    <div style={{textAlign:"center"}}>
      <div style={{color:T.white,fontSize:20,fontWeight:900,fontFamily:"'Space Grotesk',sans-serif",letterSpacing:-0.5,marginBottom:6}}>YeahRadar</div>
      <div style={{color:T.gray,fontSize:13}}>{loadMsg}</div>
    </div>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
  </div>;

  // Not logged in → show 2-step login flow
  if(!user)return<LoginFlow onLogin={(u,ind)=>{setUser(u);setIndustry(ind);}}/>;

  // No industry selected → show selector (when switching from sidebar)
  if(!industry)return<div style={{height:"100vh",overflow:"hidden",display:"flex",flexDirection:"column"}}>
    <div style={{background:T.bgSidebar,borderBottom:`1px solid ${T.border}`,padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{background:T.lime,borderRadius:8,width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:12}}>Y</div>
        <span style={{color:T.white,fontWeight:800,fontSize:13,fontFamily:"'Space Grotesk',sans-serif"}}>YeahRadar</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <span style={{color:T.gray,fontSize:12}}>{user.email}</span>
        <button onClick={handleLogout} style={{background:"transparent",border:`1px solid ${T.border}`,color:T.gray,borderRadius:7,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>Sign out</button>
      </div>
    </div>
    <div style={{flex:1,overflow:"hidden"}}><IndustrySelector onSelect={setIndustry} current={industry}/></div>
  </div>;

  return<div style={{display:"flex",height:"100vh",background:T.bg,overflow:"hidden"}}>
    {showReset&&<ResetModal/>}
    {/* Sidebar */}
    <div style={{width:220,background:T.bgSidebar,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",padding:"20px 12px",flexShrink:0}}>
      <div style={{marginBottom:28,paddingLeft:4}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{background:T.lime,borderRadius:10,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:15,fontFamily:"'Space Grotesk',sans-serif",boxShadow:`0 4px 12px ${T.limeGlow}`}}>Y</div>
          <div>
            <div style={{color:T.white,fontWeight:800,fontSize:12,lineHeight:1,letterSpacing:.5,fontFamily:"'Space Grotesk',sans-serif"}}>YEAHRADAR</div>
            <div style={{color:T.lime,fontSize:10,marginTop:3,fontWeight:600,letterSpacing:.5}}>YeahRadar</div>
          </div>
        </div>
      </div>

      <nav style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
        {nav.map(item=><NavItem key={item.id} {...item} active={page===item.id&&!selectedLead} onClick={()=>{setPage(item.id);setSelectedLead(null);}}/>)}
      </nav>

      <div style={{borderTop:`1px solid ${T.border}`,paddingTop:14,marginTop:14}}>
        <div style={{paddingLeft:4}}>
          <div style={{color:T.white,fontWeight:700,fontSize:12,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user?.email?.split("@")[0]||"User"}</div>
          <div style={{color:T.gray,fontSize:10,marginBottom:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user?.email}</div>
          {/* Industry badge */}
          <div onClick={()=>{setIndustry(null);setPage("dashboard");setSelectedLead(null);}} style={{background:`${INDUSTRIES.find(i=>i.id===industry)?.color||T.lime}15`,border:`1px solid ${INDUSTRIES.find(i=>i.id===industry)?.color||T.lime}44`,borderRadius:7,padding:"5px 10px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12}}>{INDUSTRIES.find(i=>i.id===industry)?.icon}</span>
            <span style={{color:INDUSTRIES.find(i=>i.id===industry)?.color||T.lime,fontSize:10,fontWeight:700,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{INDUSTRIES.find(i=>i.id===industry)?.label||"All"}</span>
            <span style={{color:T.gray,fontSize:9}}>↻</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:T.gray,fontSize:11}}>Permits</span>
              <span style={{color:T.lime,fontWeight:700,fontSize:11}}>{filteredPermits.length.toLocaleString()}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:T.gray,fontSize:11}}>HOT leads</span>
              <span style={{color:T.hot,fontWeight:700,fontSize:11}}>{hotCount.toLocaleString()}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:T.gray,fontSize:11}}>Pipeline</span>
              <span style={{color:T.white,fontWeight:700,fontSize:11}}>{crmLeads.length}</span>
            </div>
            <button onClick={()=>setShowReset(true)} style={{marginTop:8,background:"rgba(255,71,87,0.08)",color:T.hot,border:`1px solid rgba(255,71,87,0.2)`,borderRadius:7,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:600,width:"100%"}}>
              🗑️ Gestionar datos
            </button>
            <button onClick={handleLogout} style={{marginTop:6,background:"transparent",color:T.gray,border:`1px solid ${T.border}`,borderRadius:7,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:600,width:"100%"}}>
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </div>

    {/* Main */}
    <div style={{flex:1,overflow:"hidden"}}>
      {selectedLead
        ?<LeadDetail permit={selectedLead} onBack={()=>setSelectedLead(null)} onAddToCRM={handleAddToCRM} crmLeads={crmLeads}/>
        :page==="dashboard"?<Dashboard permits={filteredPermits} crmLeads={crmLeads} onPage={(pg,filter)=>{setDashFilter(filter||null);setPage(pg);setSelectedLead(null);}}/>
        :page==="leads"?<LeadsTable permits={filteredPermits} onSelect={setSelectedLead} initialFilter={dashFilter} onFilterUsed={()=>setDashFilter(null)}/>
        :page==="map"?<IntelMap permits={filteredPermits} onSelect={setSelectedLead}/>
        :page==="pipeline"?<Pipeline crmLeads={crmLeads} onUpdate={handleUpdateLead} permits={filteredPermits}/>
        :<DataSync permitCount={permits.length} countyStats={countyStats} onImport={loadData}/>
      }
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
